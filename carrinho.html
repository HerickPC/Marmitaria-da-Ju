<!DOCTYPE html>

<head>

<body>
    <header class="cabeca">
        <nav class="navegacao">

            </div>
            <button id="burguer-menu" class="material-symbols-outlined" aria-label="Abrir menu" aria-expanded="false"

            <div class="mainnav" id="itens">
                <ul class="li1">
                    <li><a href="/marmitas.html">Marmitas</a></li>

    <main>

                    <legend>Contato</legend>

                    <div class="formulario">
                        <label for="nome" id="name">Nome</label>
                        <input type="text" id="nome" required>
                        <div class="marmitas_opcoes">

                                <label class="marmitas_prato" >

                                        <option value="qtd">1</option>
                                        <option value="qtd">2</option>
                                        <option value="qtd">3</option>
                                        <option value="qtd">4</option>
                                        <option value="qtd">5</option>
                                        <option value="qtd">6</option>
                                        <option value="qtd">7</option>
                                    </select>
                                </label>
                                <label class="marmitas_prato">
                                    <input type="checkbox" name="marmita" value="Filé de Frango Acebolado"> Filé de
                                    Frango
                                    Acebolado
                                    <select class="quantidade" required>
                                        <option> Qtd</option>
                                        <option value="qtd">1</option>
                                        <option value="qtd">2</option>
                                        <option value="qtd">3</option>
                                        <option value="qtd">4</option>
                                        <option value="qtd">5</option>
                                        <option value="qtd">6</option>
                                        <option value="qtd">7</option>
                                    </select>
                                </label>
                                <label class="marmitas_prato">
                                    <input type="checkbox" name="marmita" value="Filé de Frango a Milanesa"> Filé de
                                    Frango
                                    a
                                    Milanesa
                                    <select class="quantidade" required>
                                        <option> Qtd</option>
                                        <option value="qtd">1</option>
                                        <option value="qtd">2</option>
                                        <option value="qtd">3</option>
                                        <option value="qtd">4</option>
                                        <option value="qtd">5</option>
                                        <option value="qtd">6</option>
                                        <option value="qtd">7</option>
                                    </select>
                                </label>
                                <label class="marmitas_prato">
                                    <input type="checkbox" name="marmita" value="Toscana Acebolada"> Toscana Acebolada
                                    <select class="quantidade" required>
                                        <option> Qtd</option>
                                        <option value="qtd">1</option>
                                        <option value="qtd">2</option>
                                        <option value="qtd">3</option>
                                        <option value="qtd">4</option>
                                        <option value="qtd">5</option>
                                        <option value="qtd">6</option>
                                        <option value="qtd">7</option>
                                    </select>
                                </label>
                                <label class="marmitas_prato">
                                    <input type="checkbox" name="marmita" value="Calabresa Acebolada"> Calabresa
                                    Acebolada
                                    <select class="quantidade" required>
                                        <option> Qtd</option>
                                        <option value="qtd">1</option>
                                        <option value="qtd">2</option>
                                        <option value="qtd">3</option>
                                        <option value="qtd">4</option>
                                        <option value="qtd">5</option>
                                        <option value="qtd">6</option>
                                        <option value="qtd">7</option>
                                    </select>
                                </label>

                                    <select class="quantidade" required>
                                        <option> Qtd</option>
                                        <option value="qtd">1</option>
                                        <option value="qtd">2</option>

                                        <option value="qtd">4</option>

                                        <option value="qtd">6</option>
                                        <option value="qtd">7</option>
                                    </select>
                                </label>
                            </div>
                        </div>

                        <label for="mensagem">Mensagem</label>
                        <textarea id="mensagem" required></textarea>
                    </div>
                </fieldset>
                <input type="hidden" name="text" value="" id="mensagem-completa">
                <button type="button" onclick="enviarMensagem()">Enviar mensagem</button>

            </form>
        </section>
        <script src="script.js"></script>
    </main>
    <script>
        function clickMenu() {
            const itens = document.getElementById('itens');
            const botao = document.getElementById('burguer-menu');
            itens.classList.toggle('open');
            botao.setAttribute('aria-expanded', itens.classList.contains('open'));
        }
    </script>
</body>

</html>
