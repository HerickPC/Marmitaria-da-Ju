<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Marmita da Ju</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
       <header class="cabeca">
        <nav class="navegacao">
            <div class="logo">
                <a href="./index.html"><img src="imagens/logo_marmitaria_sem_colher.png" alt="Logo Marmitaria da Ju"></a>
            </div>
            <button id="burguer-menu" class="material-symbols-outlined" aria-label="Abrir menu" aria-expanded="false" onclick="clickMenu()"> keyboard_arrow_down </button>
            <div class="mainnav" id="itens">
                <ul class="li1">
                    <li><a href="/marmitas.html">Marmitas</a></li>
                    <li><a href="/paes.html">Pães</a></li>
                    <li><a href="/sobremesas.html">Sobremesas</a></li>
                    <li><a href="/index.html#contato">Contato</a></li>
                    <li><a href="/sobre.html">Sobre</a></li>
                </ul>
                <ul class="li2">
                    <li><a href="/carrinho.html">Pedir</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
    <section class="opcoes-carrinho">
      <form action="https://wa.me/5511999999999" id="contato-whatsapp">
        <fieldset>
            <legend>Contato</legend>
            <label for="nome">Nome</label>
            <input type="text" id="nome" required>

            <label for="categoria-marmitas">Marmitas</label>
            <select id="categoria-marmitas" required>
                <option>Selecione uma categoria</option>    
                <option value="Bife à Milanesa">Bife à Milanesa</option>
                <option value="Filé de Frango Acebolado">Filé de Frango Acebolado</option>
                <option value="Filé de Frango a Milanesa">Filé de Frango a Milanesa</option>
                <option value="Toscana Acebolada">Toscana Acebolada</option>
                <option value="Calabresa Acebolada">Calabresa Acebolada</option>
                <option value="Feijão Completo">Feijão Completo</option>
            </select>
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" required></textarea>
        </fieldset>


        <input type="hidden" name="text" value="" id="mensagem-completa" >
        <button type="button" onclick="enviarMensagem()">Enviar mensagem</button>

    </form>
    </section>
    <script src="script.js"></script>
    </main>
    <script>
        function clickMenu() {
            const itens = document.getElementById('itens');
            const botao = document.getElementById('burguer-menu');
            itens.classList.toggle('open');
            botao.setAttribute('aria-expanded', itens.classList.contains('open'));
        }
    </script>
</body>
</html>
